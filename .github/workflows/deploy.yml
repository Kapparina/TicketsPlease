name: Deploy Discord Bot
on:
  push:
    tags: [ 'v*' ]
permissions:
  contents: read
  packages: write
jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.check.outputs.eligible }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify annotated tag on main
        id: check
        shell: bash
        run: |
          set -e
          # Ensure we have all refs
          git fetch --tags --force
          git fetch origin main --prune
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Determine if tag is annotated (tag object) vs lightweight (commit)
          TYPE=$(git cat-file -t "refs/tags/${TAG_NAME}" || echo "missing")
          if [ "$TYPE" != "tag" ]; then
            echo "Tag ${TAG_NAME} is not annotated (type=$TYPE). Skipping." >&2
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Resolve the tagged commit and verify it is contained in main
          TAG_COMMIT=$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")
          if git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tagged commit $TAG_COMMIT is not on main. Skipping." >&2
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          fi
  checks:
    runs-on: ubuntu-latest
    environment: Release
    outputs:
      passed: ${{ steps.check_ssh_secret.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: Verify build
        run: go build ./...
      - name: Run tests
        run: go test ./...
      - name: Check SSH secret exists
        id: check_ssh_secret
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY secret not set. Final check not passed."
            echo "passed=false" >> "$GITHUB_OUTPUT" 
            exit 0
          fi
          echo "SSH_PRIVATE_KEY secret set. Final check passed."
          echo "passed=true" >> "$GITHUB_OUTPUT"
  version-info:
    needs: [ checks ]
    if: needs.checks.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.commit.outputs.hash }}
      tag: ${{ steps.git_tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get all history for proper versioning
      - name: Get commit hash
        id: commit
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Get git tag
        id: git_tag
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            GIT_TAG=$(git describe --tags --exact-match HEAD)
          else
            GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "no-tag")
          fi
          echo "tag=$GIT_TAG" >> $GITHUB_OUTPUT
      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=dev
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
  build-and-push-docker-image:
    needs: [ guard, checks, version-info ]
    if: needs.guard.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kapparina/ticketsplease
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ needs.version-info.outputs.version }}
            COMMIT=${{ needs.version-info.outputs.hash }}
            GIT_TAG=${{ needs.version-info.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  remote-deployment:
    needs: [ guard, checks, version-info, build-and-push-docker-image ]
    if: (needs.guard.outputs.eligible == 'true' && needs.checks.outputs.passed == 'true')
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-host: ${{ secrets.SSH_HOST }}
          ssh-port: ${{ secrets.SSH_PORT }}
      - name: Verify deployment directory exists
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "test -d '${{ vars.DEPLOYMENT_DIR }}'"
      - name: Ensure compose.yml exists
        run: |
          if ! ( \
            ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "test -f '${{ vars.DEPLOYMENT_DIR }}/compose.yml'"; \
          ) then
            scp -P ${{ secrets.SSH_PORT }} compose.yml ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOYMENT_DIR }}/compose.yml
          fi
      - name: Ensure config.toml exists
        run: |
          if ! ( \
            ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "test -f '${{ vars.DEPLOYMENT_DIR }}/config.toml'"; \
          ) then
            scp -P ${{ secrets.SSH_PORT }} config.example.toml ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOYMENT_DIR }}/config.toml
          fi
      - name: Check .env IMAGE_TAG
        id: check_env
        run: |
          remote_image_tag="$(
            ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "test -f '${{ vars.DEPLOYMENT_DIR }}/.env' && grep -E '^IMAGE_TAG=' '${{ vars.DEPLOYMENT_DIR }}/.env' | cut -d '=' -f2- || true"
          )"
          if [ "$remote_image_tag" = "${{ needs.version-info.outputs.version }}" ]; then
            echo "env_needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "env_needs_update=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create .env file with runtime variables
        if: steps.check_env.outputs.env_needs_update == 'true'
        run: |
          echo "TICKETS_PLEASE_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}" > .env
          echo "IMAGE_TAG=${{ needs.version-info.outputs.version }}" >> .env
          scp -P ${{ secrets.SSH_PORT }} .env ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOYMENT_DIR }}/.env
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "chmod 600 '${{ vars.DEPLOYMENT_DIR }}/.env'"
